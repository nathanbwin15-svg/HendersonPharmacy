<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Henderson Pharmacy</title>
  <style>
    html,body{height:100%;margin:0;padding:0;font-family:Arial,Helvetica,sans-serif}
    body{background-color:#e9eef6;min-height:100vh;}

    /* Background image placed as an actual <img> so the full photo can be scrolled */
    .bg-image{
      position:absolute;top:0;left:0;width:100%;height:auto;z-index:0;display:block;
    }

    /* Slight dark overlay to help white boxes stay readable on busy images */
    .overlay-dark{position:absolute;inset:0;background:rgba(0,0,0,0.08);pointer-events:none;z-index:1}

    .content-wrapper{position:relative;z-index:2;min-height:100vh;box-sizing:border-box}

    /* Top-right editable text box acting as the company 'logo' */
    .logo-box{
      position:fixed;top:18px;right:18px;max-width:320px;background:#fff;border-radius:8px;
      display:flex;align-items:center;justify-content:center;box-shadow:0 6px 18px rgba(0,0,0,0.16);
      padding:10px 14px;z-index:40;overflow:hidden;
    }

    .logo-text{font-size:1rem;font-weight:700;color:#111;text-align:center;line-height:1.1;white-space:nowrap;text-overflow:ellipsis;overflow:hidden}
    .logo-text[contenteditable="true"]:empty:before{content:attr(data-placeholder);color:#999;font-weight:600}

    /* Bottom center phone box */
    .phone-box{position:fixed;left:50%;transform:translateX(-50%);bottom:20px;max-width:95%;width:520px;background:#fff;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,0.18);padding:16px 20px;z-index:40;text-align:center}
    .phone-text{font-size:1.25rem;font-weight:600;color:#111;margin:0}
    .phone-sub{font-size:0.95rem;color:#444;margin-top:6px}

    @media (max-width:520px){.logo-box{top:12px;right:12px;padding:8px 10px}.phone-box{width:calc(100% - 32px);padding:12px}.logo-text{font-size:0.95rem}}

  </style>
</head>
<body>
  <!-- The image element is used so the page height matches the image height and the user can scroll through the entire photo. Make sure the file exists at ./assets/background.jpg -->
  <img class="bg-image" src="./assets/background.jpg" alt="Background photo" />

  <div class="overlay-dark" aria-hidden="true"></div>

  <div class="content-wrapper">
    <!-- Top-right editable text box. This replaces the logo image with editable text you can change in-browser or edit in the HTML. -->
    <div class="logo-box" aria-label="Company name or title">
      <div class="logo-text" contenteditable="true" spellcheck="false" data-placeholder="Henderson Pharmacy">Henderson Pharmacy</div>
    </div>

    <!-- Bottom center phone box. Edit the text inside to change phone numbers. -->
    <div class="phone-box" role="region" aria-label="Contact phone numbers">
      <div class="phone-text">Call us: (402) 773-4300</div>
      <div class="phone-sub">Fax: (402) 773-4301 · After hours: (402) 773-4302</div>
    </div>
  </div>

  <script>
    // Put caret at end on focus for better editing UX
    document.querySelectorAll('[contenteditable="true"]').forEach(el=>{
      el.addEventListener('focus', ()=>{
        const range = document.createRange(); range.selectNodeContents(el); range.collapse(false);
        const sel = window.getSelection(); sel.removeAllRanges(); sel.addRange(range);
      });
    });

    // Ensure the background image loads before allowing layout calculations (optional helper)
    const bg = document.querySelector('.bg-image');
    if(bg && !bg.complete){
      bg.addEventListener('load', ()=>{ /* no-op: image will set page height automatically */ });
    }
  </script>
</body>
</html>
