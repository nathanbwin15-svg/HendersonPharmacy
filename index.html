<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sutton Pharmacy</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            text-align: center;
            padding: 40px 20px;
            margin: 0;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 { color: #0056b3; margin-bottom: 5px; }
        p { color: #666; font-size: 1.1em; }
        .btn {
            display: block;
            background-color: #007bff;
            color: white;
            padding: 15px;
            margin: 15px 0;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            font-size: 1.2em;
            transition: background 0.2s;
        }
        .btn:hover { background-color: #0056b3; }
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            text-align: left;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        @media (max-width: 480px) {
            .info-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Sutton Pharmacy</h1>
    <p>Your trusted local community pharmacy.</p>
    
    <a href="https://example.com/refills" class="btn">Refill Prescriptions</a>
    <a href="https://maps.google.com" class="btn">Get Directions</a>
    <a href="tel:4027734300" class="btn">Call Us: (402) 773-4300</a>

    <div class="info-grid">
        <div>
            <h3>Hours</h3>
            <strong>Mon - Thu:</strong> 9:00 AM - 5:00 PM<br>
            <strong>Fri:</strong> 9:00 AM - 1:00 PM<br>
            <strong>Sat - Sun:</strong> Closed
        </div>
        <div>
            <h3>About Us</h3>
            <p style="font-size:0.95em; margin:0;">Providing outstanding personal care and superior pharmacy services to our community.</p>
        </div>
    </div>
</div>

</body>
</html>
