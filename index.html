<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Henderson Pharmacy</title>
  <style>
    /* Page reset */
    html,body{height:100%;margin:0;padding:0;font-family:Arial,Helvetica,sans-serif}

    /* Background: replace assets/background.jpg with your uploaded image. */
    body{
      background-color:#e9eef6; /* fallback */
      background-image: url('assets/background.jpg');
      background-position: center top;
      background-size: cover;
      background-repeat: no-repeat;
      background-attachment: fixed;
      min-height:100vh;
      display:block;
    }

    /* Center container left intentionally empty so background image is full-bleed */
    .content-wrapper{
      min-height:100vh;
      position:relative;
      box-sizing:border-box;
    }

    /* Top-right logo box */
    .logo-box{
      position:fixed;
      top:20px;
      right:20px;
      width:160px;
      height:80px;
      background:#ffffff;
      border-radius:8px;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 6px 18px rgba(0,0,0,0.15);
      padding:8px;
      z-index:50;
      overflow:hidden;
    }

    .logo-box img{max-width:100%;max-height:100%;object-fit:contain}

    /* Bottom center phone box */
    .phone-box{
      position:fixed;
      left:50%;
      transform:translateX(-50%);
      bottom:20px;
      max-width:95%;
      width:520px;
      background:#ffffff;
      border-radius:10px;
      box-shadow:0 8px 24px rgba(0,0,0,0.18);
      padding:16px 20px;
      z-index:50;
      text-align:center;
    }

    .phone-box .phone-text{
      font-size:1.25rem;
      font-weight:600;
      color:#111;
    }

    /* Small screen adjustments */
    @media (max-width:520px){
      .logo-box{width:120px;height:64px;top:12px;right:12px}
      .phone-box{width:calc(100% - 32px);padding:12px;font-size:1rem}
    }

    /* Optional subtle overlay for readability on very busy images */
    .background-overlay{
      position:fixed;inset:0;background:linear-gradient(rgba(255,255,255,0.00), rgba(255,255,255,0.00));pointer-events:none;z-index:10
    }
  </style>
</head>
<body>
  <div class="content-wrapper">
    <!-- Top-right logo box. Put your logo file in the repo and update the img src below (e.g. assets/logo.png) -->
    <div class="logo-box" aria-label="Company logo">
      <!-- Replace src with your logo filename (recommended: assets/logo.png) -->
      <img src="assets/logo.png" alt="Company logo (replace assets/logo.png)" />
    </div>

    <!-- Bottom center phone box. Edit the text below to add phone numbers. -->
    <div class="phone-box" role="region" aria-label="Contact phone numbers">
      <div class="phone-text">Call us: (402) 773-4300</div>
      <!-- If you want multiple lines, add them here: -->
      <!-- <div class="phone-sub">Fax: (xxx) xxx-xxxx • After hours: (xxx) xxx-xxxx</div> -->
    </div>

    <!-- Optional overlay (kept transparent) -->
    <div class="background-overlay" aria-hidden="true"></div>
  </div>
</body>
</html>
